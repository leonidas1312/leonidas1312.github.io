<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ioannis D. Leonidas — Quantum Computing · Optimization · AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="hero-quest.jsx"></script>
  <script type="text/babel" src="quantum-bg.jsx"></script>
  <script type="text/babel" src="figures.jsx"></script>
  <script type="text/babel" src="org-logos.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script src="playful-physics.js" defer></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "accentHue": 165,
      "density": 0.7,
      "motion": 1.2,
      "bgStyle": "mono"
    }/*EDITMODE-END*/;

    const ROUTES = [
      { id: "home",         label: "Home" },
      { id: "open-source",  label: "Open source" },
      { id: "publications", label: "Publications" },
      { id: "contact",      label: "Contact" },
    ];

    function getRouteFromHash() {
      const h = (location.hash || "").replace("#/", "").replace("#", "");
      return ROUTES.find(r => r.id === h) ? h : "home";
    }

    function Topbar({ route, go }) {
      return (
        <header className="topbar">
          <div className="tb-brand" onClick={() => go("home")}>
            <span className="glyph-mini" />
          </div>
          <nav className="tb-nav">
            {ROUTES.filter(r => r.id !== "home").map(r => (
              <button key={r.id}
                className={route === r.id ? "active" : ""}
                onClick={() => go(r.id)}>
                {r.label}
              </button>
            ))}
          </nav>
          <div className="tb-side" />
        </header>
      );
    }

    function App() {
      const data = window.PORTFOLIO;
      const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = React.useState(getRouteFromHash());

      // Sync route ↔ hash
      React.useEffect(() => {
        const onHash = () => setRoute(getRouteFromHash());
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);

      const go = React.useCallback((id) => {
        location.hash = "#/" + id;
        setRoute(id);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, []);

      // Apply CSS variables from tweaks
      React.useEffect(() => {
        document.documentElement.dataset.theme = tw.theme;
        document.documentElement.dataset.bg = tw.bgStyle;
        document.documentElement.dataset.page = route;
        document.documentElement.style.setProperty('--accent-h', tw.accentHue);
        document.documentElement.style.setProperty('--density', tw.density);
        document.documentElement.style.setProperty('--motion', tw.motion);
      }, [tw, route]);

      const toggleTheme = () => setTweak('theme', tw.theme === 'dark' ? 'light' : 'dark');

      const renderRoute = () => {
        switch (route) {
          case "open-source":  return <ProjectsPage data={data} />;
          case "publications": return <WritingPage data={data} />;
          case "contact":      return <ContactPage data={data} />;
          default:             return <Home data={data} go={go} />;
        }
      };

      return (
        <div className="app">
          <QuantumBg intensity={tw.motion} accent={tw.accentHue} />
          <Topbar route={route} go={go} />
          <main className="shell" key={route}>
            {renderRoute()}
          </main>
          <footer className="app-footer">
            <span>© 2026 Ioannis D. Leonidas</span>
            <span className="fb-mid">|ψ⟩ ⇄ main()</span>
            <span className="fb-coords">Thessaloniki, GR</span>
          </footer>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Background">
              <TweakRadio
                label="Style"
                value={tw.bgStyle}
                onChange={(v) => setTweak('bgStyle', v)}
                options={[{ label: 'Mono', value: 'mono' }, { label: 'Spectrum', value: 'spectrum' }, { label: 'Aurora', value: 'aurora' }, { label: 'Confetti', value: 'confetti' }, { label: 'Quest', value: 'quest' }]}
              />
              <TweakSlider label="Accent hue" min={0} max={360} step={5} value={tw.accentHue} onChange={(v) => setTweak('accentHue', v)} suffix="°" />
            </TweakSection>
            <TweakSection title="Layout">
              <TweakSlider label="Density" min={0.7} max={1.3} step={0.05} value={tw.density} onChange={(v) => setTweak('density', v)} />
              <TweakSlider label="Motion" min={0} max={1.2} step={0.05} value={tw.motion} onChange={(v) => setTweak('motion', v)} />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
